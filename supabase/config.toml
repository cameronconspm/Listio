# Set your project ref after `supabase link --project-ref <ref>` (matches EXPO_PUBLIC_SUPABASE_URL).
project_id = "your-project-ref"

# Kong JWT verification was returning 401 Invalid JWT while Auth /user + JWT iss matched the app.
# Authorization is still required and validated inside the function (getUser + 401 on failure).
[functions.categorize-items]
verify_jwt = false

[functions.place-search]
verify_jwt = true

# Same Kong JWT verification issue as categorize-items; function still requires Authorization + getUser().
[functions.places-nearby]
verify_jwt = false

# Proxies Google Place Photo (authenticated GET); JWT validated in function.
[functions.place-photo]
verify_jwt = false

# Validates Bearer JWT inside the function, then uses service role to remove the auth user.
[functions.delete-account]
verify_jwt = false

# Same JWT gateway behavior as categorize-items; validated in-function via Authorization + getUser().
[functions.parse-recipe]
verify_jwt = false
