name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Matches package.json `ci` (typecheck, lint, verify scripts incl. EAS production safety + legal URLs, jest --ci)
      - name: Typecheck, lint, verify, test
        run: npm run ci
