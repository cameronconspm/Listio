<!doctype html>
<!--
  Deploy at the SAME URL as EXPO_PUBLIC_PASSWORD_RESET_WEB_URL (e.g. …/reset-password).

  Supabase redirects here with tokens in the hash (#access_token=...) or ?code=... .
  Add this full https URL under Supabase → Authentication → URL Configuration → Redirect URLs.

  Deep link must stay listio://auth/reset-password (matches the app).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password — Listio</title>
    <style>
      :root {
        --bg: #f7f6f2;
        --text: #1c1c1e;
        --text-secondary: #8e8e93;
        --accent: #2d8a5e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        text-align: center;
      }

      main {
        max-width: 320px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.25;
      }

      .sub {
        margin: 0 0 28px;
        font-size: 15px;
        line-height: 1.45;
        color: var(--text-secondary);
      }

      .dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: 8px;
      }

      .dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.35;
        animation: dot 1.2s ease-in-out infinite;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes dot {
        0%,
        80%,
        100% {
          opacity: 0.35;
          transform: scale(1);
        }
        40% {
          opacity: 1;
          transform: scale(1.1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .dots span {
          animation: none;
          opacity: 0.85;
        }
      }

      #fallback {
        display: none;
        margin-top: 28px;
        font-size: 15px;
        line-height: 1.45;
        color: var(--text-secondary);
      }

      #fallback a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        min-width: 44px;
        padding: 10px 12px;
        margin: 4px 0;
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
        border-radius: 10px;
      }

      #fallback a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .no-tokens #loader {
        display: none;
      }
    </style>
  </head>
  <body>
    <main id="root">
      <h1>Opening Listio…</h1>
      <p class="sub">We’re sending you back to the app to set a new password.</p>
      <div id="loader" class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
      <div id="fallback">
        If nothing happens,
        <a id="open" href="#">open Listio</a>
        to continue.
      </div>
    </main>
    <script>
      (function () {
        var appBase = 'listio://auth/reset-password';
        var hash = window.location.hash || '';
        var search = window.location.search || '';
        var hasPayload = hash.length > 1 || search.length > 1;
        var root = document.getElementById('root');
        var fallback = document.getElementById('fallback');
        var openLink = document.getElementById('open');

        function deepLinkHref() {
          if (hash.length > 1) return appBase + hash;
          if (search.length > 1) return appBase + search;
          return appBase;
        }

        function redirect() {
          window.location.replace(deepLinkHref());
        }

        openLink.href = deepLinkHref();

        if (!hasPayload) {
          root.classList.add('no-tokens');
          fallback.style.display = 'block';
          return;
        }

        setTimeout(redirect, 500);
        setTimeout(function () {
          fallback.style.display = 'block';
        }, 3000);
      })();
    </script>
  </body>
</html>
